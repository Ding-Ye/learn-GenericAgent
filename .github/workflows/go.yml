name: go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        session:
          - s01-loop
          - s02-tools
          - s03-outcome
          - s04-claude
          - s05-coderun
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: vet
        working-directory: agents/${{ matrix.session }}
        run: go vet ./...
      - name: build
        working-directory: agents/${{ matrix.session }}
        run: go build ./...
      - name: test
        working-directory: agents/${{ matrix.session }}
        run: go test -count=1 -race ./...
